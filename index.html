<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>My Portfolio | Developer</title> 

    <link rel="icon" type="image/png" href="favicon.png">

    <meta property="og:title" content="My Developer Portfolio">
    <meta property="og:description" content="Explore my latest projects, technical work, and design concepts.">
    <meta property="og:image" content="https://your-username.github.io/your-repo/preview-image.jpg">
    <meta property="og:type" content="website">

    <style>
        /* 4. Resets margins and perfectly matches Chrome's native PDF dark background */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; 
            background-color: #323639; 
        }
        
        /* 5. Forces the PDF to fill the entire screen seamlessly */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
        }

        /* 6. Styling for the mobile fallback button */
        .fallback-container {
            text-align: center; 
            margin-top: 100px; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
        }
        .download-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px; 
            background-color: #007bff; 
            color: white; 
            text-decoration: none; 
            border-radius: 6px;
            font-weight: bold;
        }
        .download-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <iframe src="your-portfolio.pdf#toolbar=0&navpanes=0&scrollbar=0">
        
        <div class="fallback-container">
            <h2>Unable to load the PDF natively.</h2>
            <p>Your browser doesn't support embedded PDFs.</p>
            <a href="Deshana's portfolio.pdf" class="download-btn" target="_blank">View or Download Portfolio</a>
        </div>
        
    </iframe>

</body>
</html>
