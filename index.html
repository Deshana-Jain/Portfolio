<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title> 
    <style>
        /* This removes all white borders around the page */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; 
        }
        /* This makes the PDF take up 100% of the screen */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>
    <iframe src="Deshana's portfolio.pdf#toolbar=0&navpanes=0&scrollbar=0"></iframe>
</body>
</html>
